name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  schedule:
    # Re-deploy daily at 6:05 UTC to pick up new episodes
    # (touching this file re-enables the schedule after GitHub's
    # 60-day inactivity auto-disable)
    - cron: '5 6 * * *'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      - id: deployment
        uses: actions/deploy-pages@v4
